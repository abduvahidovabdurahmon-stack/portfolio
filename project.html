<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Case Study | Abi Portfolio</title>
  
  <!-- Google Fonts: Syne, Plus Jakarta Sans, Space Grotesk, Playfair Display, Montserrat -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="style.css?v=1.8.4">
</head>
<body class="project-detail-page">

  <!-- Noise Overlay -->
  <div class="noise-overlay" aria-hidden="true"></div>

  <!-- Background Grid & Lights -->
  <div class="background-grid" aria-hidden="true">
    <div class="bg-base-color"></div>
    <div class="bg-glass-surface"></div>
    <div class="interactive-glow-spotlight" id="project-glow"></div>
    <div class="interactive-grid-overlay"></div>
    <div class="grid-columns">
      <div class="grid-col"></div>
      <div class="grid-col"></div>
      <div class="grid-col"></div>
      <div class="grid-col"></div>
      <div class="grid-col"></div>
    </div>
  </div>

  <!-- Header Navigation -->
  <header class="navigation-wrapper active" id="nav-header">
    <div class="navigation-inside">
      <a href="index.html" class="nav-logo" id="logo-link" aria-label="Назад на главную">
        <svg viewBox="0 0 185 125" aria-hidden="true" class="logo-svg">
          <path d="M 35 60 L 65 60 L 65 120 L 35 120 A 30 30 0 0 1 35 60 Z M 35 75 A 15 15 0 1 0 35 105 A 15 15 0 1 0 35 75 Z" fill-rule="evenodd" />
          <path d="M 80 30 L 95 30 L 95 60 L 110 60 A 30 30 0 0 1 110 120 L 80 120 Z M 110 75 A 15 15 0 1 0 110 105 A 15 15 0 1 0 110 75 Z" fill-rule="evenodd" />
          <rect x="155" y="60" width="15" height="60" />
          <path d="M 162.5 5 Q 161.5 32 147.5 40 Q 161.5 48 162.5 55 Q 163.5 48 177.5 40 Q 163.5 32 162.5 5 Z" />
        </svg>
      </a>
      
      <a href="index.html#works" class="magnetic-button button-navigation" id="project-back-btn">
        <span class="btn-text">Назад к проектам</span>
        <div class="btn-circle" style="transform: rotate(180deg);">
          <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <line x1="7" y1="17" x2="17" y2="7"></line>
            <polyline points="7 7 17 7 17 17"></polyline>
          </svg>
        </div>
      </a>
    </div>
  </header>

  <!-- Editorial Project Layout -->
  <main class="project-detail-container">
    <div class="project-detail-wrapper">
      
      <!-- Large Header Image/Visual -->
      <div class="modal-hero-visual" id="modal-hero-visual">
        <!-- Dynamic Hero Visual -->
      </div>
      
      <div class="modal-content-grid">
        
        <div class="modal-info-sidebar">
          <div class="meta-card">
            <h3 class="meta-label">Client</h3>
            <p class="meta-value" id="modal-meta-client">-</p>
          </div>
          <div class="meta-card">
            <h3 class="meta-label">Role</h3>
            <p class="meta-value" id="modal-meta-role">-</p>
          </div>
          <div class="meta-card">
            <h3 class="meta-label">Year</h3>
            <p class="meta-value font-tech" id="modal-meta-year">-</p>
          </div>
          <div class="meta-card">
            <h3 class="meta-label">Tools</h3>
            <div class="meta-pills" id="modal-meta-tools">
              <!-- Pills injected -->
            </div>
          </div>
          <div class="meta-card" id="modal-meta-pdf-card" style="display: none;">
            <h3 class="meta-label">Документация</h3>
            <a href="#" target="_blank" class="pdf-download-btn" id="modal-pdf-download-link">
              <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
              </svg>
              <span>Открыть Brandbook (PDF)</span>
            </a>
          </div>
        </div>
        
        <div class="modal-text-content">
          <h1 class="modal-title" id="modal-title">-</h1>
          <p class="modal-category font-tech" id="modal-category">-</p>
          
          <div class="case-block">
            <h2 class="case-subheading">Проблема / Вызов</h2>
            <p class="case-paragraph" id="modal-challenge">-</p>
          </div>
          
          <div class="case-block">
            <h2 class="case-subheading">Решение</h2>
            <p class="case-paragraph" id="modal-solution">-</p>
          </div>
          
          <!-- Designer details: Color Palette & Typography -->
          <div class="case-block design-specs" id="modal-design-specs">
            <h2 class="case-subheading">Палитра и Шрифты</h2>
            <div class="specs-grid">
              <div class="spec-colors-wrap">
                <p class="spec-mini-title">Colors (Click to copy)</p>
                <div class="color-palette" id="modal-color-palette">
                  <!-- Dynamic colors -->
                </div>
              </div>
              <div class="spec-fonts-wrap">
                <p class="spec-mini-title">Typography</p>
                <div class="font-specs-list" id="modal-font-specs">
                  <!-- Dynamic fonts -->
                </div>
              </div>
            </div>
          </div>
          
          <!-- Alternative specs: Brand Archive Ecosystem -->
          <div class="case-block design-specs" id="modal-archive-specs" style="display: none;">
            <h2 class="case-subheading">Креативный архив брендов</h2>
            <div class="archive-grid" id="modal-archive-grid">
              <!-- Archive items -->
            </div>
          </div>
          
        </div>
        
      </div> <!-- End of modal grid -->

      <!-- Graphic showcase container -->
      <div class="case-block graphic-showcase" id="modal-graphic-showcase" style="display: none;">
        <h2 class="case-subheading">Графические примеры</h2>
        <div class="graphic-container" id="modal-graphic-container">
          <!-- Dynamic images injected -->
        </div>
      </div>

      <!-- Video showcase container -->
      <div class="case-block video-showcase" id="modal-video-showcase" style="display: none;">
        <h2 class="case-subheading">Motion примеры</h2>
        <div class="video-container" id="modal-video-container">
          <!-- Dynamic video element -->
        </div>
      </div>

      <!-- Brandbook showcase container -->
      <div class="case-block pdf-showcase" id="modal-pdf-showcase" style="display: none;">
        <h2 class="case-subheading">Brandbook</h2>
        <div class="pdf-container" id="modal-pdf-container">
          <!-- Dynamic PDF iframe injected -->
        </div>
      </div>
      
    </div>
  </main>

  <!-- Image Lightbox Overlay -->
  <div class="image-lightbox" id="image-lightbox" role="dialog" aria-hidden="true">
    <button class="lightbox-close-btn" id="lightbox-close" aria-label="Закрыть изображение">
      <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
    <div class="lightbox-content">
      <img id="lightbox-img" src="" alt="Zoomed Graphic">
    </div>
  </div>

  <!-- Scripts -->
  <script src="projects.js?v=1.8.4"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // 1. Parse Project ID from URL (?id=...)
      const urlParams = new URLSearchParams(window.location.search);
      const projectId = urlParams.get('id') || 'aether';
      
      const projectsData = window.portfolioProjects || [];
      const project = projectsData.find(p => p.id === projectId);
      
      if (!project) {
        // Redirect back to home if project not found
        window.location.href = 'index.html';
        return;
      }
      
      // Update page title
      document.title = `${project.title} | Case Study`;
      
      // 2. Theme Enforcement
      if (project.forceDarkTheme) {
        document.body.classList.remove('light-theme');
        document.body.classList.add('force-dark-theme');
      } else if (project.forceLightTheme) {
        document.body.classList.add('light-theme');
        document.body.classList.add('force-light-theme');
      }
      
      // Customize glow spotlight color based on project accent
      const glow = document.getElementById('project-glow');
      if (glow && project.accentColor) {
        glow.style.background = `radial-gradient(circle, ${project.accentColor}33 0%, transparent 70%)`;
      }
      
      // Apply modalBg as page background if configured
      if (project.modalBg) {
        document.body.style.backgroundColor = project.modalBg;
      }
      
      // 3. Inject Content
      document.getElementById('modal-title').textContent = project.title;
      document.getElementById('modal-category').textContent = project.category;
      document.getElementById('modal-hero-visual').innerHTML = project.modalImage || project.image;
      document.getElementById('modal-meta-client').textContent = project.client;
      document.getElementById('modal-meta-role').textContent = project.role;
      document.getElementById('modal-meta-year').textContent = project.year;
      document.getElementById('modal-challenge').textContent = project.challenge;
      document.getElementById('modal-solution').textContent = project.solution;
      
      // Inject tools
      const toolsWrap = document.getElementById('modal-meta-tools');
      toolsWrap.innerHTML = '';
      project.tools.forEach(tool => {
        const span = document.createElement('span');
        span.textContent = tool;
        toolsWrap.appendChild(span);
      });
      
      // Handle PDF sidebar block
      if (project.pdf) {
        const pdfCard = document.getElementById('modal-meta-pdf-card');
        const pdfLink = document.getElementById('modal-pdf-download-link');
        if (pdfCard && pdfLink) {
          pdfCard.style.display = 'block';
          pdfLink.href = project.pdf;
        }
      }
      
      // Design specs vs Archive specs
      const designSpecsWrap = document.getElementById('modal-design-specs');
      const archiveSpecsWrap = document.getElementById('modal-archive-specs');
      
      if (project.id === 'sado') {
        if (designSpecsWrap) designSpecsWrap.style.display = 'none';
        if (archiveSpecsWrap) {
          archiveSpecsWrap.style.display = 'block';
          const archiveGrid = document.getElementById('modal-archive-grid');
          if (archiveGrid) {
            archiveGrid.innerHTML = `
              <div class="archive-card">
                <span class="archive-brand">Vokebowl</span>
                <span class="archive-type">Ramen & SMM Identity</span>
              </div>
              <div class="archive-card">
                <span class="archive-brand">United Drivers</span>
                <span class="archive-type">Logistics & Brand Identity</span>
              </div>
              <div class="archive-card">
                <span class="archive-brand">Sakura Academy</span>
                <span class="archive-type">Courses Visual Style</span>
              </div>
              <div class="archive-card">
                <span class="archive-brand">Kahwa Coffee</span>
                <span class="archive-type">Packaging & Concept Store</span>
              </div>
              <div class="archive-card">
                <span class="archive-brand">Perfetto Food</span>
                <span class="archive-type">SMM & Visual Identity</span>
              </div>
              <div class="archive-card">
                <span class="archive-brand">And others...</span>
                <span class="archive-type">Commercial & Art Projects</span>
              </div>
            `;
          }
        }
      } else {
        if (designSpecsWrap) designSpecsWrap.style.display = 'block';
        if (archiveSpecsWrap) archiveSpecsWrap.style.display = 'none';
        
        // Inject color palette
        const colorsWrap = document.getElementById('modal-color-palette');
        if (colorsWrap) {
          colorsWrap.innerHTML = '';
          project.colors.forEach(color => {
            const wrapper = document.createElement('div');
            wrapper.className = 'color-swatch-wrapper';
            wrapper.innerHTML = `
              <div class="color-swatch" style="background-color: ${color};">
                <span class="copied-tooltip">Copied!</span>
              </div>
              <span class="color-hex">${color}</span>
            `;
            
            wrapper.addEventListener('click', () => {
              navigator.clipboard.writeText(color).then(() => {
                const tooltip = wrapper.querySelector('.copied-tooltip');
                tooltip.classList.add('show');
                setTimeout(() => {
                  tooltip.classList.remove('show');
                }, 1000);
              });
            });
            colorsWrap.appendChild(wrapper);
          });
        }
        
        // Inject typography
        const fontsWrap = document.getElementById('modal-font-specs');
        if (fontsWrap) {
          fontsWrap.innerHTML = '';
          project.fonts.forEach((font, index) => {
            const item = document.createElement('div');
            item.className = 'font-spec-item';
            let fontFamilyStyle = font;
            let extraStyles = '';
            if (font.toUpperCase().includes('КРЕАТИВА')) {
              fontFamilyStyle = 'Montserrat';
              extraStyles = 'font-weight: 900; text-transform: uppercase; font-size: clamp(11px, 2.5vw, 14px); letter-spacing: 0.5px;';
            } else if (font.length > 20) {
              extraStyles = 'font-size: clamp(14px, 3.5vw, 18px); font-weight: 500; letter-spacing: 0.5px;';
            }
            
            item.innerHTML = `
              <span class="font-name" style="font-family: '${fontFamilyStyle}', sans-serif; ${extraStyles}">${font}</span>
              <span class="font-type">${project.fonts.length === 1 ? 'Typography' : (index === 0 ? 'Header Font' : 'Body Font')}</span>
            `;
            fontsWrap.appendChild(item);
          });
        }
      }
      
      // Video showcase
      const videoShowcaseWrap = document.getElementById('modal-video-showcase');
      if (project.videos || project.video) {
        if (videoShowcaseWrap) {
          videoShowcaseWrap.style.display = 'block';
          const videoContainer = document.getElementById('modal-video-container');
          if (videoContainer) {
            if (project.videos && Array.isArray(project.videos)) {
              if (project.videos.length === 1 && project.videos[0] === 'placeholder') {
                const accent = project.accentColor || '#07428c';
                videoContainer.innerHTML = `
                  <div class="media-placeholder-card" style="width: 100%; min-height: 200px; background: rgba(255,255,255,0.02); border: 2px dashed rgba(255,255,255,0.08); border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: rgba(255,255,255,0.4); padding: 40px; text-align: center; gap: 16px; margin-top: 15px;">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="${accent}" stroke-width="1.5" style="filter: drop-shadow(0 0 8px ${accent}66);">
                      <polygon points="23 7 16 12 23 17 23 7"></polygon>
                      <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
                    </svg>
                    <div>
                      <h3 style="font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; color: #fff; margin-bottom: 6px;">Motion Showcase Coming Soon</h3>
                      <p style="font-size: 0.9rem; color: rgba(255,255,255,0.4); max-width: 380px; margin: 0 auto;">Анимационные примеры и видеоролики будут добавлены в ближайшее время.</p>
                    </div>
                  </div>
                `;
              } else if (project.id === 'aether') {
                videoContainer.innerHTML = `
                  <div class="video-main-banner">
                    <video src="aist_video4.mp4" controls playsinline></video>
                  </div>
                  <div class="video-vertical-grid">
                    <div class="video-vertical-item">
                      <video src="aist_video1.mp4" controls playsinline></video>
                    </div>
                    <div class="video-vertical-item">
                      <video src="aist_video2.mp4" controls playsinline></video>
                    </div>
                    <div class="video-vertical-item">
                      <video src="aist_video3.mp4" controls playsinline></video>
                    </div>
                  </div>
                `;
              } else {
                let videosHTML = `<div class="video-grid-layout">`;
                project.videos.forEach(v => {
                  videosHTML += `
                    <div class="video-grid-item">
                      <video src="${v}" controls playsinline></video>
                    </div>
                  `;
                });
                videosHTML += `</div>`;
                videoContainer.innerHTML = videosHTML;
              }
            } else {
              if (project.video.trim().startsWith('<')) {
                videoContainer.innerHTML = project.video;
              } else {
                videoContainer.innerHTML = `<video src="${project.video}" controls playsinline style="width: 100%; height: 100%; object-fit: cover;"></video>`;
              }
            }
          }
        }
      } else {
        if (videoShowcaseWrap) videoShowcaseWrap.style.display = 'none';
      }
      
      // Graphic showcase
      const graphicShowcaseWrap = document.getElementById('modal-graphic-showcase');
      if (project.graphicImages && Array.isArray(project.graphicImages)) {
        if (graphicShowcaseWrap) {
          graphicShowcaseWrap.style.display = 'block';
          const graphicContainer = document.getElementById('modal-graphic-container');
          if (graphicContainer) {
            if (project.graphicImages.length === 1 && project.graphicImages[0] === 'placeholder') {
              const accent = project.accentColor || '#07428c';
              graphicContainer.innerHTML = `
                <div class="media-placeholder-card" style="width: 100%; min-height: 200px; background: rgba(255,255,255,0.02); border: 2px dashed rgba(255,255,255,0.08); border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: rgba(255,255,255,0.4); padding: 40px; text-align: center; gap: 16px; margin-top: 15px;">
                  <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="${accent}" stroke-width="1.5" style="filter: drop-shadow(0 0 8px ${accent}66);">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                    <polyline points="21 15 16 10 5 21"></polyline>
                  </svg>
                  <div>
                    <h3 style="font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; color: #fff; margin-bottom: 6px;">Graphics Showcase Coming Soon</h3>
                    <p style="font-size: 0.9rem; color: rgba(255,255,255,0.4); max-width: 380px; margin: 0 auto;">Графические концепты и печатные материалы будут добавлены в ближайшее время.</p>
                  </div>
                </div>
              `;
            } else {
              let graphicsHTML = '<div class="graphic-grid-layout">';
              project.graphicImages.forEach((img, idx) => {
                const spanClass = (idx === 0) ? 'grid-span-2' : '';
                graphicsHTML += `
                  <div class="graphic-grid-item ${spanClass}" data-src="${img}">
                    <img src="${img}" alt="${project.title} Graphic ${idx + 1}" loading="lazy">
                  </div>
                `;
              });
              graphicsHTML += '</div>';
              graphicContainer.innerHTML = graphicsHTML;
              
              // Bind lightboxes
              const items = graphicContainer.querySelectorAll('.graphic-grid-item');
              items.forEach(item => {
                item.addEventListener('click', () => {
                  const src = item.getAttribute('data-src');
                  openLightbox(src);
                });
              });
            }
          }
        }
      } else {
        if (graphicShowcaseWrap) graphicShowcaseWrap.style.display = 'none';
      }
      
      // PDF brandbook iframe
      const pdfShowcaseWrap = document.getElementById('modal-pdf-showcase');
      if (project.pdf) {
        if (pdfShowcaseWrap) {
          pdfShowcaseWrap.style.display = 'block';
          const pdfContainer = document.getElementById('modal-pdf-container');
          if (pdfContainer) {
            pdfContainer.innerHTML = `
              <iframe class="pdf-iframe" src="${project.pdf}" width="100%" height="700px" style="border: none; display: block;"></iframe>
              <div class="pdf-mobile-fallback">
                <div class="pdf-fallback-card">
                  <svg viewBox="0 0 24 24" width="36" height="36" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" class="pdf-fallback-icon">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                  </svg>
                  <div class="pdf-fallback-info">
                    <h4>Просмотр Brandbook (PDF)</h4>
                    <p>Мобильные устройства не поддерживают встроенный просмотр PDF. Откройте по кнопке ниже.</p>
                  </div>
                  <a href="${project.pdf}" target="_blank" class="pdf-fallback-btn">
                    <span>Открыть документ</span>
                    <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                      <line x1="7" y1="17" x2="17" y2="7"></line>
                      <polyline points="7 7 17 7 17 17"></polyline>
                    </svg>
                  </a>
                </div>
              </div>
            `;
          }
        }
      } else {
        if (pdfShowcaseWrap) pdfShowcaseWrap.style.display = 'none';
      }
      
      // Lightbox functions
      const lightbox = document.getElementById('image-lightbox');
      const lightboxImg = document.getElementById('lightbox-img');
      const lightboxClose = document.getElementById('lightbox-close');
      
      const openLightbox = (src) => {
        if (!lightbox || !lightboxImg) return;
        lightboxImg.src = src;
        lightbox.classList.add('active');
        lightbox.setAttribute('aria-hidden', 'false');
      };
      
      const closeLightbox = () => {
        if (!lightbox) return;
        lightbox.classList.remove('active');
        lightbox.setAttribute('aria-hidden', 'true');
        setTimeout(() => {
          if (lightboxImg) lightboxImg.src = '';
        }, 400);
      };
      
      if (lightboxClose) lightboxClose.addEventListener('click', closeLightbox);
      if (lightbox) {
        lightbox.addEventListener('click', (e) => {
          if (e.target === lightbox || e.target.classList.contains('lightbox-content')) {
            closeLightbox();
          }
        });
      }
      
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          if (lightbox && lightbox.classList.contains('active')) {
            closeLightbox();
          }
        }
      });

      // 4. Touch Glare movement on project specs
      const specsCards = document.querySelectorAll('.design-specs');
      specsCards.forEach(card => {
        card.addEventListener('mousemove', (e) => {
          const rect = card.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          card.style.setProperty('--mouse-x', `${x}px`);
          card.style.setProperty('--mouse-y', `${y}px`);
        });
      });
      
      // 5. Magnetic Back Button
      const backBtn = document.getElementById('project-back-btn');
      if (backBtn) {
        backBtn.addEventListener('mousemove', (e) => {
          const rect = backBtn.getBoundingClientRect();
          const x = e.clientX - rect.left - rect.width / 2;
          const y = e.clientY - rect.top - rect.height / 2;
          backBtn.style.transform = `translate(${x * 0.3}px, ${y * 0.3}px)`;
          const circle = backBtn.querySelector('.btn-circle');
          if (circle) circle.style.transform = `translate(${x * 0.1}px, ${y * 0.1}px)`;
        });
        
        backBtn.addEventListener('mouseleave', () => {
          backBtn.style.transform = '';
          const circle = backBtn.querySelector('.btn-circle');
          if (circle) circle.style.transform = '';
        });
      }
      
      // 6. Trigger page active state for entrance animations
      setTimeout(() => {
        document.body.classList.add('active');
      }, 50);
    });
  </script>
</body>
</html>
